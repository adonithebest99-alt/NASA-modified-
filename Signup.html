<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Student Helper</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #f5f7fa, #e9eef3);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.box {
  background: white;
  padding: 25px;
  width: 350px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  color: #2c3e50;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #34495e;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #2c3e50;
}

.link {
  text-align: center;
  margin-top: 10px;
}

.link a {
  color: red;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="box">
<h2>Sign Up</h2>

<form action="index.html">

<input type="text" placeholder="Full Name" required>

<select required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="text" placeholder="School" required>

<input type="email" placeholder="Email" required>

<input type="tel" placeholder="Phone Number" required>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Sign Up</button>

</form>

<div class="link">
<p>Already have an account? <a href="log.html">Login</a></p>
</div>

</div>

</body>
</html>
